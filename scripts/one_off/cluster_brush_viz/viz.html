<html lang="en">

<meta charset="utf-8" />
<title>Cluster Brush Viz</title>
<style>

  #deck { position: absolute; top: 0; left: 0; right: 280px; bottom: 28px; }

  /* Right sidebar */

              z-index: 20; background: rgba(20, 20, 20, 0.85);

              border-left: 1px solid rgba(255, 255, 255, 0.08); }

  #sidebar .section { margin-bottom: 16px; }
  #sidebar .row { display: flex; align-items: center; gap: 8px;
                   margin-bottom: 6px; }
  #sidebar .row label { flex: 1; color: #bbb; }
  #sidebar .row .val { color: #eee; font-variant-numeric: tabular-nums;
                        min-width: 36px; text-align: right; }
  #sidebar input[type=range] { width: 100%; accent-color: #6aa; }
  #sidebar select, #sidebar button {

      padding: 5px 8px; font: inherit; border-radius: 2px;
      width: 100%; box-sizing: border-box; cursor: pointer; }
  #sidebar select:hover, #sidebar button:hover { background: #2a2a2a; }
  #active-brush-wrap { display: flex; align-items: center; gap: 10px; }
  #active-brush {
      width: 50px; height: 50px; border: 2px solid #444;
      border-radius: 3px; cursor: pointer; flex-shrink: 0; }
  #active-brush-info { font-size: 11px; color: #aaa; line-height: 1.3; }
  #palette {
      display: grid; grid-template-columns: repeat(6, 28px);
      gap: 2px; margin-top: 4px; }
  #palette .swatch {
      width: 28px; height: 28px; border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer; border-radius: 2px; }
  #palette .swatch:hover { outline: 1px solid #fff; }
  #brush-picker { position: absolute; opacity: 0; pointer-events: none;
                   width: 1px; height: 1px; }

  /* Status bar */
  #statusbar { position: absolute; left: 0; right: 0; bottom: 0;
                height: 28px; z-index: 20; background: rgba(20, 20, 20, 0.85);
                border-top: 1px solid rgba(255,255,255,0.08);
                display: flex; align-items: center; padding: 0 14px;
                font-size: 11px; color: #bbb; }

  #status-right { color: #888; font-variant-numeric: tabular-nums; }
</style>
</head>

<div id="title">Cluster Brush Viz</div>

  </div>
</div>

function rgbToHex(rgb) {
  return '#' + rgb.map(v => v.toString(16).padStart(2, '0')).join('');
}
function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}
// layerIdx: 0=res7 (bottom), 1=res6, 2=res5 (top)
const MAX_OPACITY = 220 / 255;
function layerOpacity(layerIdx) {
  const d = state.depth, s = state.sigma;
  const z = (layerIdx - d) / s;
  return Math.exp(-(z*z)) * MAX_OPACITY;
}

    highPrecision: false,
    getHexagon: d => d.hex,
    getFillColor: d => state.clusterColors[d.cluster] || [180, 180, 180],
    getElevation: () => ELEVATION_OFFSETS[res],
    elevationScale: 1,
    opacity: layerOpacity(layerIdx),
    updateTriggers: {
      getFillColor: state.colorVersion,
    },
  });
}

function buildLayers() {
  return [
    buildLayer('7', 0),
    buildLayer('6', 1),
    buildLayer('5', 2),
  ];
}

const centerLon = (DATA.bounds.minLon + DATA.bounds.maxLon) / 2;
const centerLat = (DATA.bounds.minLat + DATA.bounds.maxLat) / 2;

const deckInstance = new Deck({
  parent: document.getElementById('deck'),
  views: new MapView({repeat: false}),
  initialViewState: {
    longitude: centerLon,
    latitude: centerLat,
    zoom: 6.5,
    pitch: 55,
    bearing: -20,
  },
  controller: true,
  layers: buildLayers(),
  style: {background: '#111'},
  onHover: (info) => {
    const statusLeft = document.getElementById('status-left');
    if (info && info.object) {
      const o = info.object;
      const res = info.layer.id.replace('clusters-res', '');
      statusLeft.textContent =
        `Cluster ${o.cluster} — res ${res} — n_children ${o.n_children} — entropy ${o.entropy.toFixed(3)}`;
    } else {
      statusLeft.textContent = 'hover a hex';
    }
  },
  onClick: (info) => {
    if (info && info.object) {
      applyBrush(info.object.cluster);
    }
  },
  onDragStart: (info) => {
    // Only start brushing if drag began on a hex (not empty space)
    if (info && info.object) {
      state.isDragging = true;
      state.lastBrushedCluster = null;
      applyBrush(info.object.cluster);
    }
  },
  onDrag: (info) => {
    if (!state.isDragging || !info || !info.object) return;
    const now = performance.now();
    if (now - state.lastBrushTs < 33) return;  // ~30 Hz throttle
    const c = info.object.cluster;
    if (c === state.lastBrushedCluster) return;
    state.lastBrushTs = now;
    applyBrush(c);
  },
  onDragEnd: () => { state.isDragging = false; },
});

function rebuildLayers() {
  deckInstance.setProps({layers: buildLayers()});
}

// ============================================================
// Brush logic
// ============================================================
function applyBrush(cluster) {
  state.clusterColors[cluster] = state.activeBrush.slice();
  state.lastBrushedCluster = cluster;
  state.colorVersion++;
  rebuildLayers();
}

function setActiveBrush(rgb) {
  state.activeBrush = rgb.slice();
  const swatch = document.getElementById('active-brush');
  swatch.style.background = `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
  document.getElementById('brush-picker').value = rgbToHex(rgb);
}

function applyPreset(name) {
  if (!PRESETS[name]) return;
  state.currentPreset = name;
  state.clusterColors = PRESETS[name].map(c => c.slice());
  state.colorVersion++;
  rebuildLayers();
}

// ============================================================
// Palette swatch grid (20 colors)
// ============================================================
const PALETTE_SWATCHES = [
  // 8 saturated
  [230, 30, 30], [255, 140, 0], [240, 210, 30], [40, 180, 50],
  [30, 150, 230], [100, 60, 200], [220, 60, 180], [20, 200, 200],
  // 8 pastels
  [255, 180, 180], [255, 215, 170], [255, 245, 180], [190, 235, 195],
  [180, 215, 245], [210, 195, 245], [245, 200, 230], [190, 235, 235],
  // 4 greyscale
  [240, 240, 240], [180, 180, 180], [110, 110, 110], [40, 40, 40],
];

const paletteDiv = document.getElementById('palette');
PALETTE_SWATCHES.forEach(rgb => {
  const s = document.createElement('div');
  s.className = 'swatch';
  s.style.background = `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
  s.addEventListener('click', () => setActiveBrush(rgb));
  paletteDiv.appendChild(s);
});

// ============================================================
// Controls wiring
// ============================================================
// Active brush swatch → open color picker
const brushSwatch = document.getElementById('active-brush');
const brushPicker = document.getElementById('brush-picker');
brushSwatch.addEventListener('click', () => brushPicker.click());
brushPicker.addEventListener('input', (e) => {
  setActiveBrush(hexToRgb(e.target.value));
});

// Preset dropdown
document.getElementById('preset-select').addEventListener('change', (e) => {
  applyPreset(e.target.value);
});

// Reset button
document.getElementById('reset-btn').addEventListener('click', () => {
  applyPreset(state.currentPreset);
});

// Depth slider
const depthSlider = document.getElementById('depth-slider');
const depthVal = document.getElementById('depth-val');
depthSlider.addEventListener('input', (e) => {
  state.depth = parseFloat(e.target.value);
  depthVal.textContent = state.depth.toFixed(2);
  rebuildLayers();
});

// Sigma slider
const sigmaSlider = document.getElementById('sigma-slider');
const sigmaVal = document.getElementById('sigma-val');
sigmaSlider.addEventListener('input', (e) => {
  state.sigma = parseFloat(e.target.value);
  sigmaVal.textContent = state.sigma.toFixed(2);
  rebuildLayers();
});

// Initial brush swatch paint
setActiveBrush(state.activeBrush);
</script>
</body>
</html>
