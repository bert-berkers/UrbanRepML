<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cluster Brush Viz — v2 (holographic cathedral)</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #050710; color: #ddd;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }

  #viewport {
    position: fixed;
    top: 0; left: 0;
    right: 300px; bottom: 32px;
    overflow: hidden;
    perspective: 3200px;
    perspective-origin: 50% 45%;
    /* Holographic void: deep indigo core fading to near-black edges */
    background: radial-gradient(ellipse at center, #1a1f2e 0%, #050710 80%);
  }

  #stage {
    position: absolute;
    left: 50%; top: 50%;
    width: 0; height: 0;
    transform-style: preserve-3d;
    /* default transform set at boot; animated by transition */
    transition: transform 250ms cubic-bezier(0.2, 0.7, 0.2, 1);
  }

  .slab {
    position: absolute;
    transform-style: preserve-3d;
    will-change: transform, opacity;
    /* Blue hologram glow; drop-shadow respects canvas alpha so only hex area glows */
    filter: drop-shadow(0 10px 40px rgba(120, 180, 255, 0.25));
    /* Opacity animates on wheel-scrub — short transition feels responsive */
    transition: opacity 120ms linear;
  }
  .slab canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: crosshair;
  }

  /* Controls panel */
  #controls {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 300px;
    background: #0b0d15;
    border-left: 1px solid #1a1f2e;
    padding: 16px 18px;
    box-sizing: border-box;
    overflow-y: auto;
    font-size: 12px;
  }
  #controls h3 {
    margin: 18px 0 8px 0;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    font-weight: 600;
  }
  #controls h3:first-child { margin-top: 0; }

  .active-brush-row { display: flex; align-items: center; gap: 10px; }
  #active-brush {
    width: 48px; height: 48px;
    border-radius: 6px;
    border: 2px solid #2a2e3f;
    cursor: pointer; flex-shrink: 0;
  }
  #active-brush-hex {
    font-family: "SF Mono", Consolas, monospace;
    font-size: 11px; color: #aaa;
  }
  #brush-picker {
    position: absolute;
    opacity: 0; pointer-events: none;
    width: 0; height: 0;
  }

  #palette {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
  }
  #palette .swatch {
    aspect-ratio: 1 / 1;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.08);
  }
  #palette .swatch:hover { outline: 1px solid #fff; }

  #preset-select {
    width: 100%;
    background: #161a25; color: #ddd;
    border: 1px solid #2a2e3f;
    padding: 6px 8px;
    border-radius: 4px;
    font-size: 12px;
  }

  button {
    background: #1a1f2e;
    color: #ddd;
    border: 1px solid #2a2e3f;
    padding: 7px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    width: 100%;
    margin-top: 6px;
  }
  button:hover { background: #22283a; }

  #rotate-btn, #reset-view-btn { font-family: "SF Mono", Consolas, monospace; }

  .hint {
    font-size: 10px;
    color: #666;
    line-height: 1.5;
    margin-top: 6px;
    font-family: "SF Mono", Consolas, monospace;
  }

  #status {
    position: fixed;
    bottom: 0; left: 0; right: 300px;
    height: 32px;
    background: #05070e;
    border-top: 1px solid #1a1f2e;
    display: flex; align-items: center;
    padding: 0 14px;
    font-size: 11px;
    color: #aaa;
    font-family: "SF Mono", Consolas, monospace;
    gap: 20px;
  }
  #status .left { flex: 1; }
  #status .mid { color: #8ab4ff; }
  #status .right { color: #666; font-size: 10px; }
  #status .swatch-mini {
    display: inline-block;
    width: 12px; height: 12px;
    border-radius: 2px;
    margin: 0 6px -2px 0;
    border: 1px solid rgba(255,255,255,0.2);
  }

  #loading {
    position: fixed; inset: 0;
    background: #050710;
    display: flex; align-items: center; justify-content: center;
    color: #888; font-size: 14px;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="loading">Loading label rasters...</div>

<div id="viewport">
  <div id="stage"></div>
</div>

<div id="controls">
  <h3>Active brush</h3>
  <div class="active-brush-row">
    <div id="active-brush" title="Click to pick a custom color"></div>
    <div id="active-brush-hex">rgb(31, 119, 180)</div>
    <input type="color" id="brush-picker" value="#1f77b4" />
  </div>

  <h3>Brush palette</h3>
  <div id="palette"></div>

  <h3>Colormap preset</h3>
  <select id="preset-select">
    <option value="tab10" selected>tab10</option>
    <option value="pastel10">pastel10</option>
    <option value="set3">set3</option>
    <option value="paired">paired</option>
    <option value="viridis10">viridis10</option>
    <option value="plasma10">plasma10</option>
    <option value="turbo10">turbo10</option>
  </select>
  <button id="reset-btn">Reset palette</button>

  <h3>View</h3>
  <button id="rotate-btn">Rotate — NW</button>
  <button id="reset-view-btn">Reset view (scale/pan/focus/σ)</button>
  <div class="hint">
    wheel: focus depth<br>
    ctrl+wheel: zoom<br>
    shift+wheel: σ (focus width)<br>
    drag hex: brush<br>
    drag empty: pan
  </div>
</div>

<div id="status">
  <div class="left" id="status-left">Hover a hex...</div>
  <div class="mid" id="status-mid">focus: — | σ: — | scale: 1.00x</div>
  <div class="right">ring_agg → polygon-fill k=10</div>
</div>

<script>
// ============================================================
// Colormap presets
// ============================================================
const PRESETS = {
  tab10: [[31,119,180],[255,127,14],[44,160,44],[214,39,40],[148,103,189],[140,86,75],[227,119,194],[127,127,127],[188,189,34],[23,190,207]],
  pastel10: [[174,199,232],[255,187,120],[152,223,138],[255,152,150],[197,176,213],[196,156,148],[247,182,210],[199,199,199],[219,219,141],[158,218,229]],
  set3: [[141,211,199],[255,255,179],[190,186,218],[251,128,114],[128,177,211],[253,180,98],[179,222,105],[252,205,229],[217,217,217],[188,128,189]],
  paired: [[166,206,227],[31,120,180],[178,223,138],[51,160,44],[251,154,153],[227,26,28],[253,191,111],[255,127,0],[202,178,214],[106,61,154]],
  viridis10: [[68,1,84],[72,40,120],[62,74,137],[49,104,142],[38,130,142],[31,158,137],[53,183,121],[109,205,89],[180,222,44],[253,231,37]],
  plasma10: [[13,8,135],[75,3,161],[125,3,168],[168,34,150],[203,70,121],[229,107,93],[248,148,65],[253,195,40],[240,249,33],[245,255,50]],
  turbo10: [[48,18,59],[70,107,227],[48,180,234],[40,223,170],[128,245,99],[210,234,56],[254,193,45],[253,126,39],[220,58,25],[122,4,3]],
};

const PALETTE_SWATCHES = [
  [230, 30, 30], [255, 140, 0], [240, 210, 30], [40, 180, 50],
  [30, 150, 230], [100, 60, 200], [220, 60, 180], [20, 200, 200],
  [255, 180, 180], [255, 215, 170], [255, 245, 180], [190, 235, 195],
  [180, 215, 245], [210, 195, 245], [245, 200, 230], [190, 235, 235],
  [240, 240, 240], [180, 180, 180], [110, 110, 110], [40, 40, 40],
];

// Cathedral Z per resolution (px). res7 at z=0 (bottom), res5 on top.
const Z_BY_RES = { 5: 2400, 6: 1200, 7: 0 };
const Z_MIN = 0;
const Z_MAX = 2400;
const Z_MID = (Z_MIN + Z_MAX) / 2;

// Defaults for scrub controls
const SIGMA_DEFAULT = 800;  // px; full-width-at-1/e² ≈ 2σ
const SIGMA_MIN = 100;
const SIGMA_MAX = 4000;
const SCALE_MIN = 0.3;
const SCALE_MAX = 5.0;

// Rotation
const BEARINGS = [-45, -135, 135, 45];
const BEARING_LABELS = ['NW', 'NE', 'SE', 'SW'];
const PITCH = 55;

// ============================================================
// State
// ============================================================
const state = {
  colorMap: PRESETS.tab10.map(c => c.slice()),
  currentPreset: 'tab10',
  activeBrush: PRESETS.tab10[0].slice(),
  angleIdx: 0,
  // Attentive focus
  focusZ: Z_MID,
  sigma: SIGMA_DEFAULT,
  // View transform
  scale: 1.0,
  tx: 0,
  ty: 0,
};

const LAYER_DATA = {};  // r -> {canvas, ctx, imageData, width, height, slab, z}

// ============================================================
// Boot
// ============================================================
async function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

async function boot() {
  let meta;
  try {
    meta = await fetch('./labels.json').then(r => r.json());
  } catch (e) {
    document.getElementById('loading').textContent =
      'Failed to load labels.json — did you run build_raster.py?';
    throw e;
  }

  const resolutions = meta.resolutions;
  const [h, w] = meta.raster_shape;

  const viewport = document.getElementById('viewport');
  const vh = viewport.clientHeight;
  const vw = viewport.clientWidth;
  const targetH = Math.min(vh * 0.72, vw * 0.72 * (h / w));
  const targetW = targetH * (w / h);

  const stage = document.getElementById('stage');
  const buildOrder = [...resolutions].sort((a, b) => b - a);

  for (const r of buildOrder) {
    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    canvas.style.width = targetW + 'px';
    canvas.style.height = targetH + 'px';

    const slab = document.createElement('div');
    slab.className = 'slab';
    slab.style.width = targetW + 'px';
    slab.style.height = targetH + 'px';
    slab.style.left = (-targetW / 2) + 'px';
    slab.style.top = (-targetH / 2) + 'px';
    slab.style.transform = `translateZ(${Z_BY_RES[r]}px)`;
    slab.dataset.res = r;
    slab.appendChild(canvas);
    stage.appendChild(slab);

    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const img = await loadImage(`./labels_res${r}.png`);
    ctx.drawImage(img, 0, 0);
    const imageData = ctx.getImageData(0, 0, w, h);

    LAYER_DATA[r] = {
      width: w, height: h,
      imageData, canvas, ctx,
      slab, z: Z_BY_RES[r],
    };

    attachInteraction(canvas, r);
  }

  document.getElementById('loading').remove();

  applyStageTransform();
  applyFocus();
  repaintAll();
}

// ============================================================
// Colorize
// ============================================================
function repaint(r) {
  const L = LAYER_DATA[r];
  const src = L.imageData.data;
  const N = src.length;
  if (!L.out || L.out.length !== N) L.out = new Uint8ClampedArray(N);
  const out = L.out;
  const cm = state.colorMap;
  for (let i = 0; i < N; i += 4) {
    if (src[i + 3] === 0) {
      out[i] = 0; out[i + 1] = 0; out[i + 2] = 0; out[i + 3] = 0;
      continue;
    }
    const c = cm[src[i]];
    out[i] = c[0]; out[i + 1] = c[1]; out[i + 2] = c[2]; out[i + 3] = 255;
  }
  L.ctx.putImageData(new ImageData(out, L.width, L.height), 0, 0);
}

function repaintAll() {
  for (const r of Object.keys(LAYER_DATA)) repaint(Number(r));
}

// ============================================================
// Focus (wheel scrub) — CSS opacity, no pixel repaint
// ============================================================
function applyFocus() {
  const sigma = state.sigma;
  for (const r of Object.keys(LAYER_DATA)) {
    const L = LAYER_DATA[r];
    const d = L.z - state.focusZ;
    const op = Math.exp(-(d * d) / (sigma * sigma));
    L.slab.style.opacity = op.toFixed(3);
  }
  updateMidStatus();
}

function nearestRes() {
  let best = null, bestDist = Infinity;
  for (const [r, data] of Object.entries(LAYER_DATA)) {
    const d = Math.abs(data.z - state.focusZ);
    if (d < bestDist) { bestDist = d; best = r; }
  }
  return best;
}

// ============================================================
// View transform (zoom + pan + rotate)
// ============================================================
function applyStageTransform() {
  const bearing = BEARINGS[state.angleIdx];
  const stage = document.getElementById('stage');
  // Order: translate (screen-space) → scale → rotateX → rotateZ
  // Keeps pan in screen space; rotation applies to stacked slabs beneath.
  stage.style.transform =
    `translate(${state.tx}px, ${state.ty}px) ` +
    `scale(${state.scale}) ` +
    `rotateX(${PITCH}deg) rotateZ(${bearing}deg)`;
  document.getElementById('rotate-btn').textContent =
    `Rotate — ${BEARING_LABELS[state.angleIdx]}`;
  updateMidStatus();
}

// ============================================================
// Status bar mid-readout
// ============================================================
function updateMidStatus() {
  const el = document.getElementById('status-mid');
  const r = nearestRes();
  el.textContent =
    `focus: ${state.focusZ.toFixed(0)}px → res${r}` +
    ` | σ: ${state.sigma.toFixed(0)}` +
    ` | scale: ${state.scale.toFixed(2)}x`;
}

// ============================================================
// Wheel handler: plain = focus, ctrl = zoom, shift = σ
// ============================================================
const viewport = document.getElementById('viewport');
viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (e.ctrlKey || e.metaKey) {
    // Zoom
    const factor = 1 + (-e.deltaY * 0.001);
    state.scale = Math.max(SCALE_MIN, Math.min(SCALE_MAX, state.scale * factor));
    applyStageTransform();
  } else if (e.shiftKey) {
    // σ scrub
    const factor = 1 + (-e.deltaY * 0.001);
    state.sigma = Math.max(SIGMA_MIN, Math.min(SIGMA_MAX, state.sigma * factor));
    applyFocus();
  } else {
    // Focus scrub
    // deltaY > 0 = wheel down = focusZ lowers toward res7 (z=0)
    // deltaY < 0 = wheel up   = focusZ rises toward res5 (z=Z_MAX)
    const step = e.deltaY * 2;  // 1 notch of mouse wheel ≈ 100deltaY → 200px Z
    state.focusZ = Math.max(Z_MIN, Math.min(Z_MAX, state.focusZ - step));
    applyFocus();
  }
}, { passive: false });

// ============================================================
// Brush + pan + hover
// ============================================================
function canvasPixelFromEvent(canvas, e) {
  const rect = canvas.getBoundingClientRect();
  if (rect.width === 0 || rect.height === 0) return null;
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  if (cx < 0 || cy < 0 || cx > rect.width || cy > rect.height) return null;
  const px = Math.floor(cx * (canvas.width / rect.width));
  const py = Math.floor(cy * (canvas.height / rect.height));
  return { x: px, y: py };
}

function labelAt(r, x, y) {
  const L = LAYER_DATA[r];
  if (x < 0 || y < 0 || x >= L.width || y >= L.height) return null;
  const idx = (y * L.width + x) * 4;
  if (L.imageData.data[idx + 3] === 0) return null;
  return L.imageData.data[idx];
}

let hoverPending = false;

function attachInteraction(canvas, r) {
  // Three mouse modes decided at mousedown:
  //   - left button, cursor on a hex (alpha>0)  => brush-drag
  //   - left button, cursor on empty (alpha==0) => pan-drag (moves #stage)
  //   - any other button                         => ignored (native behavior)
  let mode = null;   // 'brush' | 'pan' | null
  let panStart = null;

  const tryBrush = (e) => {
    const p = canvasPixelFromEvent(canvas, e);
    if (!p) return;
    const label = labelAt(r, p.x, p.y);
    if (label === null) return;
    const cur = state.colorMap[label];
    const b = state.activeBrush;
    if (cur[0] === b[0] && cur[1] === b[1] && cur[2] === b[2]) return;
    state.colorMap[label] = b.slice();
    repaintAll();
  };

  canvas.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    const p = canvasPixelFromEvent(canvas, e);
    if (!p) return;
    const label = labelAt(r, p.x, p.y);
    if (label !== null) {
      mode = 'brush';
      tryBrush(e);
    } else {
      mode = 'pan';
      panStart = { x: e.clientX, y: e.clientY, tx: state.tx, ty: state.ty };
    }
    e.preventDefault();
  });

  window.addEventListener('mousemove', (e) => {
    if (mode === 'pan' && panStart) {
      state.tx = panStart.tx + (e.clientX - panStart.x);
      state.ty = panStart.ty + (e.clientY - panStart.y);
      applyStageTransform();
    }
  });

  window.addEventListener('mouseup', () => {
    mode = null;
    panStart = null;
  });

  canvas.addEventListener('mousemove', (e) => {
    if (mode === 'brush') tryBrush(e);
    if (!hoverPending) {
      hoverPending = true;
      requestAnimationFrame(() => {
        hoverPending = false;
        const p = canvasPixelFromEvent(canvas, e);
        if (!p) return;
        const label = labelAt(r, p.x, p.y);
        updateHoverStatus(r, label);
      });
    }
  });
  canvas.addEventListener('mouseleave', () => {
    if (mode !== 'brush') updateHoverStatus(null, null);
  });
}

// ============================================================
// Status (hover left panel)
// ============================================================
function updateHoverStatus(r, label) {
  const el = document.getElementById('status-left');
  if (r === null || label === null) {
    el.innerHTML = 'Hover a hex...';
    return;
  }
  const c = state.colorMap[label];
  const sw = `<span class="swatch-mini" style="background: rgb(${c[0]},${c[1]},${c[2]})"></span>`;
  el.innerHTML = `${sw}cluster ${label} @ res${r}`;
}

// ============================================================
// Brush controls
// ============================================================
function setActiveBrush(rgb) {
  state.activeBrush = rgb.slice();
  const sw = document.getElementById('active-brush');
  sw.style.background = `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
  document.getElementById('active-brush-hex').textContent =
    `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
  const hex = '#' + rgb.map(v => v.toString(16).padStart(2, '0')).join('');
  document.getElementById('brush-picker').value = hex;
}
function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}

function applyPreset(name) {
  const preset = PRESETS[name];
  if (!preset) return;
  state.currentPreset = name;
  state.colorMap = preset.map(c => c.slice());
  repaintAll();
}

// ============================================================
// DOM wiring
// ============================================================
const paletteDiv = document.getElementById('palette');
PALETTE_SWATCHES.forEach(rgb => {
  const s = document.createElement('div');
  s.className = 'swatch';
  s.style.background = `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
  s.addEventListener('click', () => setActiveBrush(rgb));
  paletteDiv.appendChild(s);
});

const brushSwatch = document.getElementById('active-brush');
const brushPicker = document.getElementById('brush-picker');
brushSwatch.addEventListener('click', () => brushPicker.click());
brushPicker.addEventListener('input', (e) => setActiveBrush(hexToRgb(e.target.value)));

document.getElementById('preset-select').addEventListener('change', (e) => {
  applyPreset(e.target.value);
});
document.getElementById('reset-btn').addEventListener('click', () => {
  applyPreset(state.currentPreset);
});
document.getElementById('rotate-btn').addEventListener('click', () => {
  state.angleIdx = (state.angleIdx + 1) % 4;
  applyStageTransform();
});
document.getElementById('reset-view-btn').addEventListener('click', () => {
  state.scale = 1.0;
  state.tx = 0;
  state.ty = 0;
  state.focusZ = Z_MID;
  state.sigma = SIGMA_DEFAULT;
  applyStageTransform();
  applyFocus();
});

setActiveBrush(state.activeBrush);
boot();
</script>
</body>
</html>
