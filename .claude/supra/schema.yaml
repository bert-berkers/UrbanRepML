groups:
  execution:
    label: "Execution Posture"
    description: "How you want work to flow"
  quality:
    label: "Quality Attention"
    description: "How much to invest in correctness and testing"
  domain:
    label: "Domain Focus"
    description: "Which technical domains to amplify"

dimensions:
  execution_speed:
    description: "How fast vs how careful"
    group: execution
    default: 3
    low_label: "Careful & thorough"
    high_label: "Fast & decisive"
    agent_relevance:
      coordinator: 1.0
      execution: 1.0
      qaqc: 0.7
      devops: 0.6

  exploration_vs_exploitation:
    description: "Try new approaches vs use proven ones"
    group: execution
    default: 3
    low_label: "Proven approaches"
    high_label: "Explore new ideas"
    agent_relevance:
      coordinator: 1.0
      spec-writer: 1.0
      stage2-fusion-architect: 0.7

  code_quality:
    description: "Investment in clean code, typing, structure"
    group: quality
    default: 3
    low_label: "Good enough"
    high_label: "Production-grade"
    agent_relevance:
      qaqc: 1.0
      devops: 0.8
      coordinator: 0.6

  test_coverage:
    description: "How much testing to do"
    group: quality
    default: 3
    low_label: "Skip tests"
    high_label: "Thorough coverage"
    agent_relevance:
      qaqc: 1.0
      devops: 0.6

  spatial_correctness:
    description: "Verify spatial operations, CRS, H3 conventions"
    group: domain
    default: 3
    low_label: "Trust it works"
    high_label: "Verify rigorously"
    agent_relevance:
      srai-spatial: 1.0
      stage1-modality-encoder: 0.8
      qaqc: 0.6

  model_architecture:
    description: "Focus on model design, loss functions, architecture"
    group: domain
    default: 3
    low_label: "Don't overthink"
    high_label: "Deep architectural care"
    agent_relevance:
      stage2-fusion-architect: 1.0
      stage3-analyst: 0.6
      spec-writer: 0.7

  urgency:
    description: "How aggressively to prioritize long-deferred items and housekeeping"
    group: execution
    default: 3
    low_label: "Let it ride"
    high_label: "Clear the backlog now"
    agent_relevance:
      devops: 1.0
      coordinator: 0.8
      qaqc: 0.6

  data_engineering_diligence:
    description: "Verify data provenance, naming, column prefixes, file integrity before downstream use"
    group: quality
    default: 3
    low_label: "Trust the pipeline"
    high_label: "Audit everything"
    agent_relevance:
      stage1-modality-encoder: 1.0
      stage2-fusion-architect: 0.9
      qaqc: 0.8
      coordinator: 0.7
      librarian: 0.6

modes:
  exploratory:
    description: "Open-ended, creative, follow interesting threads"
    biases: {exploration_vs_exploitation: +1, execution_speed: -1}
  focused:
    description: "Clear goal, execute efficiently"
    biases: {execution_speed: +1, exploration_vs_exploitation: -1}
  sprint:
    description: "Ship it. Speed over perfection"
    biases: {execution_speed: +2, code_quality: -1, test_coverage: -1}
  creative:
    description: "Architecture and invention mode. Ideas over output"
    biases: {exploration_vs_exploitation: +2, execution_speed: -1}

compound_states:
  creative-prototyping:
    description: "Try things fast, expect rough edges. Rapid iteration over polish."
    dimensions:
      exploration_vs_exploitation: 5
      execution_speed: 4
      code_quality: 2
      test_coverage: 1
    mode: creative
    tension_warning: null

  production-hardening:
    description: "Lock it down, verify everything. Correctness over speed."
    dimensions:
      code_quality: 5
      test_coverage: 5
      execution_speed: 2
      spatial_correctness: 4
    mode: focused
    tension_warning: null

  deep-investigation:
    description: "Understand deeply, no rush. Read more than write."
    dimensions:
      exploration_vs_exploitation: 5
      model_architecture: 5
      execution_speed: 1
    mode: exploratory
    tension_warning: null

  sprint-shipping:
    description: "Get it out the door. Speed over everything."
    dimensions:
      execution_speed: 5
      code_quality: 2
      test_coverage: 1
      exploration_vs_exploitation: 1
    mode: sprint
    tension_warning: null

  careful-exploration:
    description: "Explore but do it right. Investigate thoroughly with quality gates."
    dimensions:
      exploration_vs_exploitation: 5
      code_quality: 4
      execution_speed: 2
    mode: exploratory
    tension_warning: "Tension: explore and quality can fight each other. The explorer wants to try things; the quality gate rejects half of them. Expect slower iteration than pure exploration."

  training-run:
    description: "Let the model cook. Monitor, do not interrupt."
    dimensions:
      model_architecture: 5
      execution_speed: 3
      exploration_vs_exploitation: 2
    mode: focused
    tension_warning: null
